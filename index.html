<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shopline 銷售分析儀表板</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
<style>
:root{
  --nav:#1e2d4a;--accent:#2563eb;--accent2:#10b981;
  --bg:#f0f4f9;--card:#fff;--bdr:#dde3ef;
  --txt:#1e293b;--sub:#64748b;
  --g:#10b981;--r:#ef4444;--y:#f59e0b;
  --gbg:#d1fae5;--rbg:#fee2e2;--ybg:#fef3c7;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI','Microsoft JhengHei',sans-serif;background:var(--bg);color:var(--txt);font-size:14px}

/* NAV */
.nav{background:var(--nav);padding:0 24px;display:flex;align-items:center;gap:4px;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.35)}
.logo{color:#fff;font-size:16px;font-weight:700;margin-right:18px;white-space:nowrap}
.logo em{color:#60a5fa;font-style:normal}
.tb{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;padding:5px 14px;border-radius:6px;transition:background .15s,color .15s}
.tb:hover{background:rgba(255,255,255,.1);color:#fff}
.tb.on{background:var(--accent);color:#fff}
.nav-sp{flex:1}
.nav-i{color:rgba(255,255,255,.45);font-size:12px;white-space:nowrap}

/* SLICER BAR */
.slicer{background:#fff;border-bottom:1px solid var(--bdr);padding:8px 24px;display:flex;align-items:center;gap:6px;position:sticky;top:52px;z-index:190;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.slicer-label{font-size:12px;color:var(--sub);font-weight:600;margin-right:4px;letter-spacing:.3px}
.sb{background:none;border:1px solid var(--bdr);cursor:pointer;color:var(--txt);font-size:12px;font-weight:500;padding:4px 14px;border-radius:16px;transition:all .15s}
.sb:hover{border-color:var(--accent);color:var(--accent)}
.sb.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.xf-bar{background:var(--ybg);padding:6px 24px;display:none;align-items:center;gap:10px;font-size:12px;border-bottom:1px solid #fcd34d}
.xf-bar b{color:var(--txt)}
.xf-btn{background:none;border:1px solid #f59e0b;color:#92400e;font-size:11px;padding:2px 10px;border-radius:12px;cursor:pointer}

/* TABS */
.tp{display:none;padding:20px 24px}
.tp.on{display:block}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:18px}
.kc{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid var(--bdr);box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
.kc::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:var(--accent);border-radius:10px 0 0 10px}
.kc.green::before{background:var(--g)} .kc.red::before{background:var(--r)} .kc.yellow::before{background:var(--y)}
.kc-l{font-size:11px;color:var(--sub);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kc-v{font-size:22px;font-weight:700;line-height:1.1}
.kc-b{display:inline-flex;align-items:center;gap:3px;margin-top:6px;font-size:11px;font-weight:600;padding:2px 8px;border-radius:16px}
.kc-b.pos{color:var(--g);background:var(--gbg)} .kc-b.neg{color:var(--r);background:var(--rbg)} .kc-b.neu{color:var(--sub);background:#f1f5f9}
.kc canvas.spark{position:absolute;bottom:6px;right:10px;opacity:.5}

/* CHART GRID */
.cg{display:grid;gap:14px;margin-bottom:16px}
.cg.g1{grid-template-columns:1fr}
.cg.g2{grid-template-columns:1fr 1fr}
.cg.g3{grid-template-columns:1fr 1fr 1fr}
.cg.g21{grid-template-columns:2fr 1fr}
.cc{background:var(--card);border-radius:10px;padding:16px 18px;border:1px solid var(--bdr);box-shadow:0 1px 4px rgba(0,0,0,.06)}
.cc h3{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:5px}
.cc h3 .d{width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;flex-shrink:0}
.cw{position:relative}
.h200{height:200px} .h260{height:260px} .h300{height:300px} .h360{height:360px} .h440{height:440px}
.cw canvas{width:100%!important;height:100%!important}
.st{font-size:17px;font-weight:700;margin-bottom:14px;padding-bottom:7px;border-bottom:3px solid var(--accent);display:inline-block}

/* TABLE */
.dtw{overflow-x:auto;margin-top:4px}
.dt{width:100%;border-collapse:collapse;font-size:13px}
.dt th{background:#f8fafc;color:var(--sub);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;padding:7px 12px;border-bottom:2px solid var(--bdr);text-align:left}
.dt td{padding:6px 12px;border-bottom:1px solid #f1f5f9}
.dt tr:hover td{background:#f8fafc}
.rb{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border-radius:50%;font-size:10px;font-weight:700;background:#e2e8f0;color:var(--sub)}
.rb.t3{background:var(--accent);color:#fff}

/* TOOLTIP */
.ctt{position:fixed;width:300px;background:#fff;border:1px solid var(--bdr);border-radius:10px;box-shadow:0 8px 28px rgba(0,0,0,.16);padding:14px 16px;z-index:999;pointer-events:none;font-size:13px;display:none}
.ctt-h{font-weight:700;font-size:14px;margin-bottom:8px;padding-bottom:6px;border-bottom:2px solid var(--accent)}
.ctt-r{display:flex;justify-content:space-between;margin:3px 0}
.ctt-l{color:var(--sub)} .ctt-v{font-weight:600}

@media(max-width:960px){.cg.g2,.cg.g3,.cg.g21{grid-template-columns:1fr}.kpi-row{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.kpi-row{grid-template-columns:1fr}.nav{padding:0 10px;gap:2px}.tb{padding:4px 8px;font-size:11px}.slicer{padding:6px 10px;gap:4px;flex-wrap:wrap}}
</style>
</head>
<body>

<nav class="nav">
  <div class="logo">Shopline <em>Analytics</em></div>
  <button class="tb on" onclick="stab('t1',this)">銷售總覽</button>
  <button class="tb" onclick="stab('t2',this)">月度分析</button>
  <button class="tb" onclick="stab('t3',this)">商品排行</button>
  <button class="tb" onclick="stab('t4',this)">訂單分析</button>
  <button class="tb" onclick="stab('t5',this)">客戶洞察</button>
  <div class="nav-sp"></div>
  <div class="nav-i" id="ni"></div>
</nav>

<div class="slicer" id="slicer-bar">
  <span class="slicer-label">年度篩選</span>
</div>

<div class="xf-bar" id="xf-bar">
  <span>篩選中: <b id="xf-txt"></b></span>
  <button class="xf-btn" onclick="clearXF()">清除篩選</button>
</div>

<div id="ctt" class="ctt"><div class="ctt-h"></div><div class="ctt-b"></div></div>

<!-- TAB 1 -->
<div id="t1" class="tp on">
  <div class="st">銷售總覽</div>
  <div class="kpi-row" id="kpi-row"></div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>近 24 個月營收趨勢（本期 vs 同期去年）</h3><div class="cw h300"><canvas id="c-comp"></canvas></div></div></div>
  <div class="cg g2">
    <div class="cc"><h3><span class="d"></span>歷年年度總營收</h3><div class="cw h260"><canvas id="c-yr"></canvas></div></div>
    <div class="cc"><h3><span class="d"></span>歷年年度訂單數</h3><div class="cw h260"><canvas id="c-yo"></canvas></div></div>
  </div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>營收瀑布圖分解</h3><div class="cw h260"><canvas id="c-wf"></canvas></div></div></div>
</div>

<!-- TAB 2 -->
<div id="t2" class="tp">
  <div class="st">月度分析</div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>月營收（柱狀）+ 平均客單價（折線）— 雙軸</h3><div class="cw h300"><canvas id="c-combo"></canvas></div></div></div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>近 12 個月 YoY 差異 %（vs 同期去年）</h3><div class="cw h260"><canvas id="c-yoy"></canvas></div></div></div>
  <div class="cg g2">
    <div class="cc"><h3><span class="d"></span>每月訂單數趨勢</h3><div class="cw h260"><canvas id="c-tord"></canvas></div></div>
    <div class="cc"><h3><span class="d" style="background:var(--r)"></span>取消訂單數</h3><div class="cw h200"><canvas id="c-cancel"></canvas></div></div>
  </div>
</div>

<!-- TAB 3 -->
<div id="t3" class="tp">
  <div class="st">商品排行（依銷量）</div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>熱銷商品 Top 20（已過濾贈品）</h3><div class="cw h440"><canvas id="c-prod"></canvas></div></div></div>
  <div class="cc"><h3><span class="d"></span>商品明細表</h3><div class="dtw"><table class="dt" id="ptbl"></table></div></div>
</div>

<!-- TAB 4 -->
<div id="t4" class="tp">
  <div class="st">訂單分析</div>
  <div class="cg g2">
    <div class="cc"><h3><span class="d"></span>付款方式（依訂單數）</h3><div class="cw h300"><canvas id="c-pay"></canvas></div></div>
    <div class="cc"><h3><span class="d"></span>訂單狀態分布</h3><div class="cw h300"><canvas id="c-stat"></canvas></div></div>
  </div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>配送方式排行（依訂單數）</h3><div class="cw h260"><canvas id="c-ship"></canvas></div></div></div>
</div>

<!-- TAB 5 -->
<div id="t5" class="tp">
  <div class="st">客戶洞察</div>
  <div class="cg g1"><div class="cc"><h3><span class="d"></span>客戶來源（how_know，依訂單數）</h3><div class="cw h300"><canvas id="c-hk"></canvas></div></div></div>
  <div class="cg g2">
    <div class="cc"><h3><span class="d"></span>地區分布（依營收）</h3><div class="cw h300"><canvas id="c-reg"></canvas></div></div>
    <div class="cc"><h3><span class="d"></span>會員等級（依營收）</h3><div class="cw h300"><canvas id="c-mem"></canvas></div></div>
  </div>
</div>

};
function trunc(s,n=24){return s&&s.length>n?s.slice(0,n)+'\u2026':s}
function agg(arr,kf,vf){
  const m={};
  arr.forEach(r=>{const k=kf(r);m[k]=(m[k]||0)+vf(r)});
  return Object.entries(m).sort((a,b)=>b[1]-a[1]);
}
function aggMulti(arr,kf,vfs){
  const m={};
  arr.forEach(r=>{
    const k=kf(r);
    if(!m[k]) m[k]=Object.fromEntries(Object.keys(vfs).map(n=>[n,0]));
    for(const n in vfs) m[k][n]+=vfs[n](r);
  });
  return Object.entries(m).sort((a,b)=>{
    const first=Object.keys(vfs)[0];
    return b[1][first]-a[1][first];
  });
}

/* ── Navbar info ───────────────────────────────────────────── */
document.getElementById('ni').textContent='\u8CC7\u6599\u81F3 '+K.cms;

/* ── Cross-filter (stub) ───────────────────────────────────── */
function clearXF(){document.getElementById('xf-bar').style.display='none';rebuild()}

/* ── Custom Tooltip ────────────────────────────────────────── */
function extTT(ctx){
  const tt=ctx.tooltip, el=document.getElementById('ctt');
  if(tt.opacity===0){el.style.display='none';return}
  const pos=ctx.chart.canvas.getBoundingClientRect();
  let x=pos.left+tt.caretX+12, y=pos.top+tt.caretY-20;
  if(x+310>window.innerWidth) x=pos.left+tt.caretX-320;
  if(y+200>window.innerHeight) y=window.innerHeight-210;
  if(y<0) y=8;
  el.style.left=x+'px';el.style.top=y+'px';el.style.display='block';

  const dp=tt.dataPoints;if(!dp||!dp.length){el.style.display='none';return}
  const title=tt.title?tt.title[0]:'';
  const hdr=el.querySelector('.ctt-h');
  const body=el.querySelector('.ctt-b');
  hdr.textContent=title;

  // Build rows from all data points
  let html='';
  dp.forEach(p=>{
    const v=p.raw;
    const lbl=p.dataset.label||'';
    let display;
    if(Array.isArray(v)){
      display=fmt.$(Math.abs(v[1]-v[0]));
    } else if(typeof v==='number'&&Math.abs(v)>5000){
      display=fmt.$(v);
    } else if(typeof v==='number'){
      display=v.toLocaleString('zh-TW');
    } else {
      display=v;
    }
    html+=`<div class="ctt-r"><span class="ctt-l">${lbl}</span><span class="ctt-v">${display}</span></div>`;
  });

  // Add contextual info for monthly data
  const m=title;
  const md=R.monthly.find(x=>x.month===m);
  if(md){
    html+=`<div class="ctt-r"><span class="ctt-l">\u8A02\u55AE\u6578</span><span class="ctt-v">${fmt.n(md.oc)}</span></div>`;
    html+=`<div class="ctt-r"><span class="ctt-l">\u5E73\u5747\u5BA2\u55AE\u50F9</span><span class="ctt-v">${fmt.$(md.aov)}</span></div>`;
    html+=`<div class="ctt-r"><span class="ctt-l">\u53D6\u6D88\u8A02\u55AE</span><span class="ctt-v">${md.cancel}</span></div>`;
    // YoY
    const py=R.monthly.find(x=>x.month===(parseInt(m.slice(0,4))-1)+m.slice(4));
    if(py&&py.rev>0){
      const pct=((md.rev-py.rev)/py.rev*100);
      html+=`<div class="ctt-r"><span class="ctt-l">YoY</span><span class="ctt-v" style="color:${pct>=0?'var(--g)':'var(--r)'}">${fmt['%'](pct)}</span></div>`;
    }
  }
  body.innerHTML=html;
}

/* ── Base chart options ────────────────────────────────────── */
const BO={responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'Microsoft JhengHei,sans-serif',size:12},color:'#1e293b',boxWidth:12}},tooltip:{enabled:false,external:extTT}}};

/* ── Chart creation helper ─────────────────────────────────── */
function mk(id,cfg){
  if(CH[id]){CH[id].destroy();delete CH[id]}
  CH[id]=new Chart(document.getElementById(id),cfg);
  return CH[id];
}

/* ── Filter helpers ────────────────────────────────────────── */
function fM(){ return AY?R.monthly.filter(m=>m.month.startsWith(AY)):R.monthly }
function fY(arr){ return AY?arr.filter(x=>x.y===AY):arr }

/* ══════════════════════════════════════════════════════════════
   REBUILD ALL CHARTS
   ══════════════════════════════════════════════════════════════ */
function rebuild(){
  buildKPI();
  buildComp();
  buildYearly();
  buildWaterfall();
  buildCombo();
  buildYoY();
  buildTrend();
  buildCancel();
  buildProducts();
  buildPayment();
  buildStatus();
  buildShipping();
  buildHowKnow();
  buildRegion();
  buildMember();
}

/* ── KPI Cards ─────────────────────────────────────────────── */
function buildKPI(){
  const row=document.getElementById('kpi-row');
  row.innerHTML='';
  const mo=fM();
  const totalRev=mo.reduce((s,m)=>s+m.rev,0);
  const totalOrd=mo.reduce((s,m)=>s+m.oc,0);
  const avgOV=totalOrd>0?totalRev/totalOrd:0;

  // Compute YoY for filtered period
  let yoyPct=null;
  if(AY){
    const pyYear=String(parseInt(AY)-1);
    const pyMo=R.monthly.filter(m=>m.month.startsWith(pyYear));
    const pyRev=pyMo.reduce((s,m)=>s+m.rev,0);
    if(pyRev>0) yoyPct=((totalRev-pyRev)/pyRev*100);
  } else {
    yoyPct=K.yoy;
  }

  const yearLabel=AY||String(K.fy);

  const cards=[
    {l:yearLabel+' \u5E74\u5EA6\u71DF\u6536',v:fmt.$(totalRev),c:''},
    {l:yearLabel+' \u5E74\u5EA6\u8A02\u55AE\u6578',v:fmt.n(totalOrd),c:'green'},
    {l:yearLabel+' \u5E73\u5747\u5BA2\u55AE\u50F9',v:fmt.$(avgOV),c:''},
    {l:'YoY \u71DF\u6536\u6210\u9577',v:fmt['%'](yoyPct),
     b:yoyPct==null?{cls:'neu',t:'N/A'}:yoyPct>=0?{cls:'pos',t:'\u25B2 '+fmt['%'](Math.abs(yoyPct))}:{cls:'neg',t:'\u25BC '+fmt['%'](Math.abs(yoyPct))},
     c:yoyPct!=null&&yoyPct>=0?'green':'red'},
  ];

  if(!AY&&K.inc){
    cards.push({l:K.cy+' \u5E74\u7D2F\u8A08\u71DF\u6536\uFF08\u622A\u81F3 '+K.cm+' \u6708\uFF09',v:fmt.$(K.cy_rev),b:{cls:'neu',t:fmt.n(K.cy_ord)+' \u7B46\u8A02\u55AE'},c:'yellow'});
    const cm=R.monthly[R.monthly.length-1];
    if(cm) cards.push({l:cm.month+' \u7576\u6708\u71DF\u6536',v:fmt.$(cm.rev),b:{cls:'neu',t:fmt.n(cm.oc)+' \u7B46'},c:''});
  }

  // Sparkline data: last 12 months of filtered data
  const spark12=mo.slice(-12);

  cards.forEach((c,ci)=>{
    const div=document.createElement('div');
    div.className='kc '+(c.c||'');
    div.innerHTML=`<div class="kc-l">${c.l}</div><div class="kc-v">${c.v}</div>`
      +(c.b?`<span class="kc-b ${c.b.cls}">${c.b.t}</span>`:'')
      +'<canvas class="spark" width="100" height="30"></canvas>';
    row.appendChild(div);

    // Draw sparkline
    const cvs=div.querySelector('canvas.spark');
    if(spark12.length>1){
      const vals=ci===0?spark12.map(m=>m.rev):ci===1?spark12.map(m=>m.oc):ci===2?spark12.map(m=>m.aov):spark12.map(m=>m.rev);
      new Chart(cvs,{type:'line',data:{labels:spark12.map(m=>m.month),datasets:[{data:vals,borderColor:'rgba(37,99,235,.5)',borderWidth:1.5,pointRadius:0,tension:.4,fill:{target:'origin',above:'rgba(37,99,235,.06)'}}]},
        options:{responsive:false,plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}}}
      });
    }
  });
}

/* ── 24-Month Comparison ───────────────────────────────────── */
function buildComp(){
  const mo=fM();
  const last24=AY?mo:mo.slice(-24);
  const mm={};R.monthly.forEach(m=>{mm[m.month]=m});
  const labels=[],cur=[],prev=[];
  last24.forEach(m=>{
    labels.push(m.month);
    cur.push(m.rev);
    const pm=(parseInt(m.month.slice(0,4))-1)+m.month.slice(4);
    prev.push(mm[pm]?mm[pm].rev:null);
  });
  mk('c-comp',{type:'line',data:{labels,datasets:[
    {label:'\u672C\u671F',data:cur,borderColor:BLUE,backgroundColor:'rgba(37,99,235,.07)',tension:.3,fill:true,pointRadius:3},
    {label:'\u540C\u671F\u53BB\u5E74',data:prev,borderColor:BLUE2,borderDash:[6,3],backgroundColor:'transparent',tension:.3,fill:false,pointRadius:3,spanGaps:true}
  ]},options:{...BO,scales:{x:{ticks:{maxRotation:45,font:{size:10}}},y:{ticks:{callback:v=>fmt.w(v)}}}}});
}

/* ── Yearly Revenue & Orders ───────────────────────────────── */
function buildYearly(){
  const yr=R.yearly;
  mk('c-yr',{type:'bar',data:{labels:yr.map(y=>y.year),datasets:[{label:'\u5E74\u5EA6\u71DF\u6536',data:yr.map(y=>y.revenue),backgroundColor:yr.map(y=>y.year===String(K.cy)?YELLOW:BLUE),borderRadius:5}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},scales:{y:{ticks:{callback:v=>fmt.w(v)}}}}});
  mk('c-yo',{type:'bar',data:{labels:yr.map(y=>y.year),datasets:[{label:'\u8A02\u55AE\u6578',data:yr.map(y=>y.orders),backgroundColor:yr.map(y=>y.year===String(K.cy)?YELLOW:GREEN),borderRadius:5}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toLocaleString('zh-TW')}}}}});
}

/* ── Waterfall ─────────────────────────────────────────────── */
function buildWaterfall(){
  let wf;
  if(AY){
    wf=R.waterfall.find(w=>w.y===AY);
  }else{
    wf=R.waterfall.reduce((a,w)=>({sub:a.sub+w.sub,disc:a.disc+w.disc,ship:a.ship+w.ship,total:a.total+w.total}),{sub:0,disc:0,ship:0,total:0});
  }
  if(!wf){mk('c-wf',{type:'bar',data:{labels:[],datasets:[]},options:{}});return}

  const s=wf.sub, d=wf.disc, sh=wf.ship, t=wf.total;
  const labels=['\u5546\u54C1\u5C0F\u8A08','\u6298\u6263','\u904B\u8CBB','\u6DE8\u71DF\u6536'];
  const data=[[0,s],[s-d,s],[s-d,s-d+sh],[0,t]];
  const colors=[BLUE,RED,GREEN,'rgba(30,45,74,.85)'];
  mk('c-wf',{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},indexAxis:'x',
      scales:{y:{ticks:{callback:v=>fmt.w(v)}}}}});
}

/* ── Combo Chart: Revenue + AOV ────────────────────────────── */
function buildCombo(){
  const mo=fM().slice(-12);
  mk('c-combo',{type:'bar',data:{labels:mo.map(m=>m.month),datasets:[
    {label:'\u6708\u71DF\u6536',type:'bar',data:mo.map(m=>m.rev),backgroundColor:BLUE,borderRadius:4,yAxisID:'y',order:2},
    {label:'\u5E73\u5747\u5BA2\u55AE\u50F9',type:'line',data:mo.map(m=>m.aov),borderColor:PURPLE,backgroundColor:'transparent',tension:.3,pointRadius:4,yAxisID:'y1',order:1}
  ]},options:{...BO,scales:{
    y:{position:'left',ticks:{callback:v=>fmt.w(v)}},
    y1:{position:'right',grid:{drawOnChartArea:false},ticks:{callback:v=>'NT$'+v.toLocaleString()}},
    x:{ticks:{maxRotation:45,font:{size:10}}}
  }}});
}

/* ── YoY ───────────────────────────────────────────────────── */
function buildYoY(){
  const mo=fM();
  const recent=AY?mo:mo.slice(-12);
  const mm={};R.monthly.forEach(m=>{mm[m.month]=m});
  const labels=[],vals=[];
  recent.forEach(m=>{
    const pm=(parseInt(m.month.slice(0,4))-1)+m.month.slice(4);
    if(mm[pm]&&mm[pm].rev>0){
      labels.push(m.month);
      vals.push(Math.round((m.rev-mm[pm].rev)/mm[pm].rev*1000)/10);
    }
  });
  mk('c-yoy',{type:'bar',data:{labels,datasets:[{label:'YoY %',data:vals,backgroundColor:vals.map(v=>v>=0?GREEN:RED),borderRadius:4}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},scales:{y:{ticks:{callback:v=>fmt['%'](v)}}}}});
}

/* ── Trend: Orders ─────────────────────────────────────────── */
function buildTrend(){
  const mo=fM().slice(-12);
  mk('c-tord',{type:'line',data:{labels:mo.map(m=>m.month),datasets:[{label:'\u8A02\u55AE\u6578',data:mo.map(m=>m.oc),borderColor:GREEN,backgroundColor:'rgba(16,185,129,.1)',tension:.3,fill:true,pointRadius:4}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}}},y:{ticks:{callback:v=>v.toLocaleString('zh-TW')}}}}});
}

/* ── Cancel ─────────────────────────────────────────────────── */
function buildCancel(){
  const mo=fM().slice(-12);
  mk('c-cancel',{type:'bar',data:{labels:mo.map(m=>m.month),datasets:[{label:'\u53D6\u6D88\u8A02\u55AE',data:mo.map(m=>m.cancel),backgroundColor:RED,borderRadius:4}]},
    options:{...BO,plugins:{...BO.plugins,legend:{display:false}},scales:{x:{ticks:{maxRotation:45,font:{size:10}}}}}});
}

/* ── Products ──────────────────────────────────────────────── */
function buildProducts(){
  const fp=fY(R.top_products);
  // Re-aggregate across years
  const ag=agg(fp,r=>r.name,r=>r.qty).slice(0,20);
  const names=ag.map(x=>trunc(x[0],26)).reverse();
  const qtys=ag.map(x=>x[1]).reverse();

  mk('c-prod',{type:'bar',data:{labels:names,datasets:[{label:'\u92B7\u91CF\uFF08\u4EF6\uFF09',data:qtys,backgroundColor:BLUE,borderRadius:4}]},
    options:{...BO,indexAxis:'y',plugins:{...BO.plugins,legend:{display:false}},
      scales:{x:{ticks:{callback:v=>v.toLocaleString()}},y:{ticks:{font:{size:10}}}}}});

  // Also build product count map
  const agOC=aggMulti(fp,r=>r.name,{qty:r=>r.qty,oc:r=>r.oc});
  const top20=agOC.slice(0,20);

  const tbl=document.getElementById('ptbl');
  tbl.innerHTML=`<thead><tr><th>\u6392\u540D</th><th>\u5546\u54C1\u540D\u7A31</th><th>\u7E3D\u92B7\u91CF</th><th>\u6210\u4EA4\u8A02\u55AE\u6578</th></tr></thead><tbody>`
    +top20.map(([n,v],i)=>`<tr><td><span class="rb ${i<3?'t3':''}">${i+1}</span></td><td>${n}</td><td><b>${fmt.n(v.qty)}</b></td><td>${fmt.n(v.oc)}</td></tr>`).join('')
    +`</tbody>`;
}

/* ── Payment ───────────────────────────────────────────────── */
function buildPayment(){
  const fp=fY(R.payment);
  const ag=agg(fp,r=>r.m,r=>r.c).slice(0,10);
  mk('c-pay',{type:'doughnut',data:{labels:ag.map(x=>x[0]),datasets:[{data:ag.map(x=>x[1]),backgroundColor:PALETTE,borderWidth:2,borderColor:'#fff'}]},
    options:{...BO,cutout:'50%',plugins:{...BO.plugins,legend:{position:'right',labels:{font:{size:11,family:'Microsoft JhengHei,sans-serif'},boxWidth:12}}}}});
}
